<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Painel - Chopp do Mineiro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .table-card {
      border-radius: 12px;
      padding: 20px;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      min-height: 100px;
    }

    .white {
      background: #f5f5f5;
    }

    .green {
      background: #44d17a;
    }

    .yellow {
      background: #ffd447;
    }

    .red {
      background: #ff5c5c;
    }

    .reason {
      font-size: 13px;
      font-weight: normal;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: #222;
      color: #fff;
      width: min(640px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .close-button {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
    }

    .tab-block {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .order-row:last-child {
      border-bottom: none;
    }

    .status-pending {
      color: #ffd447;
    }

    .status-delivered {
      color: #44d17a;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }

    .blink {
      animation: blink 1s infinite;
    }
  </style>
</head>

<body>
  <h1>Painel do Salão</h1>

  <div id="tables-grid" class="grid"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close-button" onclick="closeModal()">×</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    async function loadTables() {
      const response = await fetch("http://127.0.0.1:8000/tables/status/all");
      const tables = await response.json();

      const grid = document.getElementById("tables-grid");
      grid.innerHTML = "";

      tables.forEach(table => {
        const card = document.createElement("div");
        card.className = `table-card ${table.status}`;

        if (table.status === "red") {
          card.classList.add("blink");
        }

        card.innerHTML = `
          <div>Mesa ${table.table_number}</div>
          <div class="reason">${table.reason}</div>
          <div class="reason">Comandas abertas: ${table.open_tabs_count}</div>
        `;

        card.onclick = () => openTable(table.table_id);

        grid.appendChild(card);
      });
    }

    async function openTable(tableId) {
      const response = await fetch(`http://127.0.0.1:8000/tables/${tableId}/details`);
      const data = await response.json();

      document.getElementById("modal-title").textContent = `Mesa ${data.table_number}`;

      const body = document.getElementById("modal-body");
      body.innerHTML = "";

      if (data.tabs.length === 0) {
        body.innerHTML = "<p>Nenhuma comanda aberta nesta mesa.</p>";
      }

      data.tabs.forEach(tab => {
        const tabBlock = document.createElement("div");
        tabBlock.className = "tab-block";

        let ordersHtml = "";

        if (tab.orders.length === 0) {
          ordersHtml = "<p>Nenhum pedido nesta comanda.</p>";
        } else {
          ordersHtml = tab.orders.map(order => `
            <div class="order-row">
              <span>${order.product_name} x${order.quantity}</span>
              ${order.is_delivered
              ? `<span class="status-delivered">Entregue</span>`
              : `<button onclick="deliverOrder(${order.id}, ${tableId})">Marcar entregue</button>`
            } 
            </div>
            `).join("");
        }

        tabBlock.innerHTML = `
          <h3>Comanda #${tab.tab_id}</h3>
          <p><strong>Cliente:</strong> ${tab.customer_name}</p>
          <p><strong>Fechamento:</strong> ${tab.is_requesting_close ? "Solicitado" : "Não solicitado"}</p>
          <p><strong>Atendimento:</strong> ${tab.is_calling_waiter ? "Garçom solicitado" : "Sem chamado"}</p>
          ${tab.is_calling_waiter
            ? `<button onclick="cancelWaiter(${tab.tab_id}, ${tableId})">Atendimento realizado</button>`
            : ""
          }
          ${ordersHtml}

          ${tab.is_requesting_close
            ? `<button onclick="closeTab(${tab.tab_id}, ${tableId})">Confirmar pagamento e fechar comanda</button>`
            : ""
          }
        `;

        body.appendChild(tabBlock);
      });

      document.getElementById("modal").classList.remove("hidden");
    }

    async function deliverOrder(orderId, tableId) {
      await fetch(`http://127.0.0.1:8000/orders/${orderId}/deliver`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    async function closeTab(tabId, tableId) {
      await fetch(`http://127.0.0.1:8000/tabs/${tabId}/close`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    async function cancelWaiter(tabId, tableId) {
      await fetch(`http://127.0.0.1:8000/tabs/${tabId}/cancel-waiter`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    loadTables();
    setInterval(loadTables, 5000);
  </script>
</body>

</html>
