<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Painel - Chopp do Mineiro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .table-card {
      border-radius: 12px;
      padding: 20px;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      min-height: 100px;
    }

    .white {
      background: #f5f5f5;
    }

    .green {
      background: #44d17a;
    }

    .yellow {
      background: #ffd447;
    }

    .red {
      background: #ff5c5c;
      color: #fff;
    }

    .reason {
      font-size: 13px;
      font-weight: normal;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: #222;
      color: #fff;
      width: min(640px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .close-button {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
    }

    .tab-block {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .order-row:last-child {
      border-bottom: none;
    }

    .status-pending {
      color: #ffd447;
    }

    .status-delivered {
      color: #44d17a;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }

    .blink {
      animation: blink 1s infinite;
    }

    .feedback-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #44d17a;
      color: #111;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      font-weight: bold;
      padding: 12px 18px;
      z-index: 2000;
    }
    .api-debug-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      max-width: min(360px, calc(100vw - 20px));
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      line-height: 1.3;
      z-index: 9999;
      word-break: break-all;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <h1>Painel do Salão</h1>

  <div id="api-debug-badge" class="api-debug-badge"></div>
  <div id="feedback-toast" class="feedback-toast hidden"></div>

  <div id="tables-grid" class="grid"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close-button" onclick="closeModal()">×</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    document.getElementById("api-debug-badge").textContent = `API: ${window.API_BASE_URL}`;

    const tableSeenAt = {};
    let feedbackTimer = null;

    function showFeedback(message) {
      const toast = document.getElementById("feedback-toast");
      toast.textContent = message;
      toast.classList.remove("hidden");

      if (feedbackTimer) {
        clearTimeout(feedbackTimer);
      }

      feedbackTimer = setTimeout(() => {
        toast.classList.add("hidden");
      }, 2000);
    }

    function getTableTimerText(table) {
      if (table.status === "white") {
        delete tableSeenAt[table.table_id];
        return "";
      }

      if (!tableSeenAt[table.table_id]) {
        tableSeenAt[table.table_id] = Date.now();
      }

      const minutes = Math.floor((Date.now() - tableSeenAt[table.table_id]) / 60000);
      return ` — ${minutes} min`;
    }

    async function loadTables() {
      let tables = [];

      try {
        const response = await apiFetch("/tables/status/all");
        tables = await response.json();
      } catch (error) {
        document.getElementById("tables-grid").innerHTML = `<p>Erro ao carregar mesas: ${error.message}</p>`;
        return;
      }

      const grid = document.getElementById("tables-grid");
      grid.innerHTML = "";

      tables.forEach(table => {
        const card = document.createElement("div");
        card.className = `table-card ${table.status}`;
        const timerText = getTableTimerText(table);

        if (table.status === "red" && table.attention_type === "close_request") {
          card.classList.add("blink");
        }

        card.innerHTML = `
          <div>Mesa ${table.table_number}${timerText}</div>
          <div class="reason">${table.reason}</div>
          <div class="reason">Comandas abertas: ${table.open_tabs_count}</div>
        `;

        card.onclick = () => openTable(table.table_id);

        grid.appendChild(card);
      });
    }

    async function openTable(tableId) {
      let data;

      try {
        const response = await apiFetch(`/tables/${tableId}/staff-details`);
        data = await response.json();
      } catch (error) {
        alert(`Erro ao carregar mesa: ${error.message}`);
        return;
      }

      document.getElementById("modal-title").textContent = `Mesa ${data.table_number}`;

      const body = document.getElementById("modal-body");
      body.innerHTML = "";
      body.innerHTML = `
          <button onclick="openCreateTabForm(${tableId})">Abrir nova comanda</button>
          ${data.is_calling_waiter
          ? `<button onclick="resolveTableWaiterCall(${tableId})">Atendimento realizado</button>`
          : ""
        }
        `;

      const sessionLinks = [];
      const seenSessions = new Set();

      data.tabs.forEach(tab => {
        if (!tab.session_token || seenSessions.has(tab.session_token)) return;

        seenSessions.add(tab.session_token);

        const sessionTableId = tab.session_table_id || tableId;
        const url = new URL(
          `../customer/index.html?table_id=${sessionTableId}&session_token=${encodeURIComponent(tab.session_token)}&api_base_url=${encodeURIComponent(window.API_BASE_URL)}`,
          window.location.href
        ).href;

        sessionLinks.push(`
          <div class="tab-block">
            <p><strong>Link da sessão:</strong></p>
            <p style="word-break: break-all; font-size: 13px;">${url}</p>
            <button onclick="copySessionLink('${url}')">Copiar link da sessão</button>
          </div>
        `);
      });

      if (sessionLinks.length > 0) {
        body.innerHTML += sessionLinks.join("");
      }

      if (data.tabs.length === 0) {
        body.innerHTML += "<p>Nenhuma comanda aberta nesta mesa.</p>";
      }

      data.tabs.forEach(tab => {
        const tabBlock = document.createElement("div");
        tabBlock.className = "tab-block";

        let ordersHtml = "";
        let total = 0;

        if (tab.orders.length === 0) {
          ordersHtml = "<p>Nenhum pedido nesta comanda.</p>";
        } else {
          ordersHtml = tab.orders.map(order => {

            const price = order.price || 0;
            total += price * order.quantity;

            return `
              <div class="order-row">
                <span>${order.product_name} x${order.quantity}</span>
                ${tab.is_closing_confirmed
                ? `<span>R$ ${(price * order.quantity).toFixed(2)}</span>`
                : ""
              }
                ${order.is_delivered
                ? `<span class="status-delivered">Entregue</span>`
                : `
                    <button onclick="deliverOrder(${order.id}, ${tableId})">Marcar entregue</button>
                    <button onclick="cancelOrder(${order.id}, ${tableId})">Cancelar pedido</button>
                  `
              }
              </div>
            `;
          }).join("");

          if (tab.is_closing_confirmed) {
            ordersHtml += `<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;
          }
        }

        tabBlock.innerHTML = `
          <h3>Comanda #${tab.tab_id}</h3>
          <p><strong>Cliente:</strong> ${tab.customer_name}</p>
          <p><strong>Observação:</strong> ${tab.observation || "Sem observação"}</p>
          <p><strong>Mesas agrupadas:</strong> ${tab.grouped_table_ids || data.table_number}</p>
          <p><strong>Fechamento:</strong> ${tab.is_closing_confirmed
            ? "Confirmado"
            : tab.is_requesting_close
              ? "Solicitado"
              : "Não solicitado"
          }</p>
          ${tab.is_requesting_close && !tab.is_closing_confirmed
            ? `<button onclick="confirmClose(${tab.tab_id}, ${tableId})">Fechar comanda</button>`
            : ""
          }

          ${tab.is_closing_confirmed
            ? `<button onclick="closeTab(${tab.tab_id}, ${tableId})">Confirmar pagamento e encerrar</button>`
            : ""
          }
          <p><strong>Atendimento:</strong> ${tab.is_calling_waiter ? "Garçom solicitado" : "Sem chamado"}</p>
          <button onclick="openNewOrder(${tab.tab_id})">Novo pedido</button>
          <button onclick="openGroupTables(${tab.tab_id}, ${tableId})">Agrupar mesa</button>
          ${tab.is_calling_waiter
            ? `<button onclick="resolveWaiterCall(${tab.tab_id}, ${tableId})">Atendimento realizado</button>`
            : ""
          }
          ${ordersHtml}
        `;

        body.appendChild(tabBlock);
      });

      document.getElementById("modal").classList.remove("hidden");
    }

    let staffCart = []
    let selectedTabId = null

    async function openNewOrder(tabId) {
      selectedTabId = tabId
      staffCart = []

      let products = []

      try {
        const response = await apiFetch("/products/")
        products = await response.json()
      } catch (error) {
        alert(`Erro ao carregar produtos: ${error.message}`)
        return
      }

      const body = document.getElementById("modal-body")

      body.innerHTML = `
        <h3>Novo Pedido</h3>
        <div id="product-list"></div>
        <div id="cart"></div>
        <button onclick="confirmStaffOrder()">Confirmar Pedido</button>
  `

      const list = document.getElementById("product-list")

      products.forEach(p => {
        const btn = document.createElement("button")
        btn.textContent = p.name
        btn.onclick = () => addToStaffCart(p)
        list.appendChild(btn)
      })
    }

    function addToStaffCart(product) {
      const item = staffCart.find(i => i.product_id === product.id)

      if (item) {
        item.quantity++
      } else {
        staffCart.push({
          product_id: product.id,
          name: product.name,
          quantity: 1
        })
      }

      renderStaffCart()
    }

    function removeStaffItem(id) {
      staffCart = staffCart.filter(i => i.product_id !== id)
      renderStaffCart()
    }

    function renderStaffCart() {
      const cartDiv = document.getElementById("cart")

      if (staffCart.length === 0) {
        cartDiv.innerHTML = "<p>Nenhum item</p>"
        return
      }

      cartDiv.innerHTML = staffCart.map(item => `
    <p>
      ${item.name} x${item.quantity}
      <button onclick="removeStaffItem(${item.product_id})">Remover</button>
    </p>
  `).join("")
    }

    async function confirmStaffOrder() {
      if (staffCart.length === 0) {
        alert("Adicione itens")
        return
      }

      try {
        await apiFetch("/orders/batch", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tab_id: selectedTabId,
            items: staffCart.map(i => ({
              product_id: i.product_id,
              quantity: i.quantity
            }))
          })
        })
      } catch (error) {
        alert(`Erro ao enviar pedido: ${error.message}`)
        return
      }

      showFeedback("✔ Pedido enviado")

      const currentTableId = document.getElementById("modal-title").textContent.replace("Mesa ", "")
      await openTable(Number(currentTableId))
      await loadTables()
    }

    async function deliverOrder(orderId, tableId) {
      try {
        await apiFetch(`/orders/${orderId}/deliver`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao marcar pedido entregue: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("✔ Pedido entregue");
    }

    async function cancelOrder(orderId, tableId) {
      const confirmed = confirm("Deseja cancelar este pedido?");

      if (!confirmed) return;

      try {
        await apiFetch(`/orders/${orderId}/cancel`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao cancelar pedido: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    async function copySessionLink(url) {
      await navigator.clipboard.writeText(url);
      alert("Link da sessão copiado.");
    }

    async function closeTab(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao encerrar comanda: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("✔ Comanda encerrada");
    }

    async function resolveWaiterCall(tabId, tableId) {
      try {
        // limpa chamada da comanda
        await apiFetch(`/tabs/${tabId}/cancel-waiter`, {
          method: "PATCH"
        });

        // limpa chamada da mesa
        await apiFetch(`/tables/${tableId}/cancel-waiter`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao resolver chamado: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    async function openGroupTables(tabId, tableId) {
      let tables = [];

      try {
        const response = await apiFetch("/tables/status/all");
        tables = await response.json();
      } catch (error) {
        alert(`Erro ao carregar mesas: ${error.message}`);
        return;
      }

      const freeTables = tables.filter(table => table.status === "white");

      const body = document.getElementById("modal-body");

      body.innerHTML = `
        <h3>Agrupar mesa</h3>
        <div id="free-tables-list"></div>
        <button onclick="confirmGroupTables(${tabId}, ${tableId})">Confirmar agrupamento</button>
        <button onclick="openTable(${tableId})">Voltar</button>
      `;

      const list = document.getElementById("free-tables-list");

      if (freeTables.length === 0) {
        list.innerHTML = "<p>Nenhuma mesa livre disponível.</p>";
        return;
      }

      list.innerHTML = freeTables.map(table => `
        <label style="display:block; margin-top:8px;">
          <input
            type="checkbox"
            class="free-table-checkbox"
            value="${table.table_id}"
          />
          Mesa ${table.table_number}
        </label>
      `).join("");
    }

    async function confirmGroupTables(tabId, tableId) {
      const selectedTables = Array.from(document.querySelectorAll(".free-table-checkbox:checked"))
        .map(input => Number(input.value));

      if (selectedTables.length === 0) {
        alert("Selecione ao menos uma mesa livre.");
        return;
      }

      let response;

      try {
        response = await apiFetch(`/tabs/${tabId}/group-tables`, {
        method: "PATCH",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          table_ids: selectedTables
        })
        });
      } catch (error) {
        alert(error.message);
        return;
      }

      if (!response.ok) {
        const data = await response.json();
        alert(data.detail || "Não foi possível agrupar as mesas.");
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    async function openCreateTabForm(tableId) {
      let tables = [];

      try {
        const response = await apiFetch("/tables/");
        tables = await response.json();
      } catch (error) {
        alert(`Erro ao carregar mesas: ${error.message}`);
        return;
      }

      const body = document.getElementById("modal-body");

      body.innerHTML = `
    <h3>Abrir comanda</h3>

    <label>Nome do cliente ou grupo:</label>
    <input id="new-tab-name" placeholder="Ex: João / Mesa da família" />

    <label>Observação:</label>
    <textarea id="new-tab-observation" placeholder="Ex: Mesa junto com a 2, aniversário, sem gelo..." style="width:100%; min-height:80px; margin-top:12px;"></textarea>

    <h4>Agrupar mesas</h4>
    <div id="group-tables-list"></div>

    <button onclick="confirmCreateTab(${tableId})">Abrir comanda</button>
  `;

      const list = document.getElementById("group-tables-list");

      list.innerHTML = tables.map(table => `
    <label style="display:block; margin-top:8px;">
      <input 
        type="checkbox" 
        class="group-table-checkbox" 
        value="${table.id}" 
        ${table.id === tableId ? "checked" : ""}
      />
      Mesa ${table.number}
    </label>
  `).join("");
    }

    async function confirmCreateTab(tableId) {
      const name = document.getElementById("new-tab-name").value.trim();
      const observation = document.getElementById("new-tab-observation").value.trim();

      if (!name) {
        alert("Informe o nome do cliente ou grupo.");
        return;
      }

      const selectedTables = Array.from(document.querySelectorAll(".group-table-checkbox:checked"))
        .map(input => Number(input.value));

      try {
        await apiFetch("/tabs/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            table_id: tableId,
            customer_name: name,
            customer_phone: null,
            observation: observation || null,
            grouped_table_ids: selectedTables
          })
        });
      } catch (error) {
        alert(`Erro ao abrir comanda: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    async function resolveTableWaiterCall(tableId) {
      try {
        await apiFetch(`/tables/${tableId}/cancel-waiter`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao resolver chamado: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    loadTables();
    setInterval(loadTables, 5000);

    async function confirmClose(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/confirm-close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao confirmar fechamento: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("✔ Fechamento confirmado");
    }

  </script>
</body>

</html>
