<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <title>Painel - Chopp do Mineiro</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px;
    }

    h1 {
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    .table-card {
      border-radius: 12px;
      padding: 20px;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      min-height: 100px;
    }

    .white {
      background: #f5f5f5;
    }

    .green {
      background: #44d17a;
    }

    .yellow {
      background: #ffd447;
    }

    .red {
      background: #ff5c5c;
      color: #fff;
    }

    .reason {
      font-size: 13px;
      font-weight: normal;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: #222;
      color: #fff;
      width: min(640px, 90vw);
      max-height: 80vh;
      overflow-y: auto;
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .close-button {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
    }

    .tab-block {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #333;
    }

    .order-row:last-child {
      border-bottom: none;
    }

    .status-pending {
      color: #ffd447;
    }

    .status-delivered {
      color: #44d17a;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }

    .blink {
      animation: blink 1s infinite;
    }
  </style>
</head>

<body>
  <h1>Painel do Salão</h1>

  <div id="tables-grid" class="grid"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close-button" onclick="closeModal()">×</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    async function loadTables() {
      const response = await fetch("http://127.0.0.1:8000/tables/status/all");
      const tables = await response.json();

      const grid = document.getElementById("tables-grid");
      grid.innerHTML = "";

      tables.forEach(table => {
        const card = document.createElement("div");
        card.className = `table-card ${table.status}`;

        if (table.status === "red" && table.attention_type === "close_request") {
          card.classList.add("blink");
        }

        card.innerHTML = `
          <div>Mesa ${table.table_number}</div>
          <div class="reason">${table.reason}</div>
          <div class="reason">Comandas abertas: ${table.open_tabs_count}</div>
        `;

        card.onclick = () => openTable(table.table_id);

        grid.appendChild(card);
      });
    }

    async function openTable(tableId) {
      const response = await fetch(`http://127.0.0.1:8000/tables/${tableId}/details`);
      const data = await response.json();

      document.getElementById("modal-title").textContent = `Mesa ${data.table_number}`;

      const body = document.getElementById("modal-body");
      body.innerHTML = "";
      body.innerHTML = `
          <button onclick="openCreateTabForm(${tableId})">Abrir nova comanda</button>
          ${data.is_calling_waiter
          ? `<button onclick="resolveTableWaiterCall(${tableId})">Atendimento realizado</button>`
          : ""
        }
        `;

      if (data.tabs.length === 0) {
        body.innerHTML += "<p>Nenhuma comanda aberta nesta mesa.</p>";
      }

      data.tabs.forEach(tab => {
        const tabBlock = document.createElement("div");
        tabBlock.className = "tab-block";

        let ordersHtml = "";
        let total = 0;

        if (tab.orders.length === 0) {
          ordersHtml = "<p>Nenhum pedido nesta comanda.</p>";
        } else {
          ordersHtml = tab.orders.map(order => {

            const price = order.price || 0;
            total += price * order.quantity;

            return `
              <div class="order-row">
                <span>${order.product_name} x${order.quantity}</span>
                ${tab.is_closing_confirmed
                ? `<span>R$ ${(price * order.quantity).toFixed(2)}</span>`
                : ""
              }
                ${order.is_delivered
                ? `<span class="status-delivered">Entregue</span>`
                : `
                    <button onclick="deliverOrder(${order.id}, ${tableId})">Marcar entregue</button>
                    <button onclick="cancelOrder(${order.id}, ${tableId})">Cancelar pedido</button>
                  `
              }
              </div>
            `;
          }).join("");

          if (tab.is_closing_confirmed) {
            ordersHtml += `<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;
          }
        }

        tabBlock.innerHTML = `
          <h3>Comanda #${tab.tab_id}</h3>
          <p><strong>Cliente:</strong> ${tab.customer_name}</p>
          <p><strong>Observação:</strong> ${tab.observation || "Sem observação"}</p>
          <p><strong>Mesas agrupadas:</strong> ${tab.grouped_table_ids || data.table_number}</p>
          <p><strong>Fechamento:</strong> ${tab.is_closing_confirmed
            ? "Confirmado"
            : tab.is_requesting_close
              ? "Solicitado"
              : "Não solicitado"
          }</p>
          ${tab.is_requesting_close && !tab.is_closing_confirmed
            ? `<button onclick="confirmClose(${tab.tab_id}, ${tableId})">Fechar comanda</button>`
            : ""
          }

          ${tab.is_closing_confirmed
            ? `<button onclick="closeTab(${tab.tab_id}, ${tableId})">Confirmar pagamento e encerrar</button>`
            : ""
          }
          <p><strong>Atendimento:</strong> ${tab.is_calling_waiter ? "Garçom solicitado" : "Sem chamado"}</p>
          <button onclick="openNewOrder(${tab.tab_id})">Novo pedido</button>
          ${tab.is_calling_waiter
            ? `<button onclick="resolveWaiterCall(${tab.tab_id}, ${tableId})">Atendimento realizado</button>`
            : ""
          }
          ${ordersHtml}
        `;

        body.appendChild(tabBlock);
      });

      document.getElementById("modal").classList.remove("hidden");
    }

    let staffCart = []
    let selectedTabId = null

    async function openNewOrder(tabId) {
      selectedTabId = tabId
      staffCart = []

      const response = await fetch("http://127.0.0.1:8000/products/")
      const products = await response.json()

      const body = document.getElementById("modal-body")

      body.innerHTML = `
        <h3>Novo Pedido</h3>
        <div id="product-list"></div>
        <div id="cart"></div>
        <button onclick="confirmStaffOrder()">Confirmar Pedido</button>
  `

      const list = document.getElementById("product-list")

      products.forEach(p => {
        const btn = document.createElement("button")
        btn.textContent = p.name
        btn.onclick = () => addToStaffCart(p)
        list.appendChild(btn)
      })
    }

    function addToStaffCart(product) {
      const item = staffCart.find(i => i.product_id === product.id)

      if (item) {
        item.quantity++
      } else {
        staffCart.push({
          product_id: product.id,
          name: product.name,
          quantity: 1
        })
      }

      renderStaffCart()
    }

    function removeStaffItem(id) {
      staffCart = staffCart.filter(i => i.product_id !== id)
      renderStaffCart()
    }

    function renderStaffCart() {
      const cartDiv = document.getElementById("cart")

      if (staffCart.length === 0) {
        cartDiv.innerHTML = "<p>Nenhum item</p>"
        return
      }

      cartDiv.innerHTML = staffCart.map(item => `
    <p>
      ${item.name} x${item.quantity}
      <button onclick="removeStaffItem(${item.product_id})">Remover</button>
    </p>
  `).join("")
    }

    async function confirmStaffOrder() {
      if (staffCart.length === 0) {
        alert("Adicione itens")
        return
      }

      await fetch("http://127.0.0.1:8000/orders/batch", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          tab_id: selectedTabId,
          items: staffCart.map(i => ({
            product_id: i.product_id,
            quantity: i.quantity
          }))
        })
      })

      alert("Pedido enviado")

      const currentTableId = document.getElementById("modal-title").textContent.replace("Mesa ", "")
      await openTable(Number(currentTableId))
      await loadTables()
    }

    async function deliverOrder(orderId, tableId) {
      await fetch(`http://127.0.0.1:8000/orders/${orderId}/deliver`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    async function cancelOrder(orderId, tableId) {
      const confirmed = confirm("Deseja cancelar este pedido?");

      if (!confirmed) return;

      await fetch(`http://127.0.0.1:8000/orders/${orderId}/cancel`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    async function closeTab(tabId, tableId) {
      await fetch(`http://127.0.0.1:8000/tabs/${tabId}/close`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    async function resolveWaiterCall(tabId, tableId) {
      // limpa chamada da comanda
      await fetch(`http://127.0.0.1:8000/tabs/${tabId}/cancel-waiter`, {
        method: "PATCH"
      });

      // limpa chamada da mesa
      await fetch(`http://127.0.0.1:8000/tables/${tableId}/cancel-waiter`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    async function openCreateTabForm(tableId) {
      const response = await fetch("http://127.0.0.1:8000/tables/");
      const tables = await response.json();

      const body = document.getElementById("modal-body");

      body.innerHTML = `
    <h3>Abrir comanda</h3>

    <label>Nome do cliente ou grupo:</label>
    <input id="new-tab-name" placeholder="Ex: João / Mesa da família" />

    <label>Observação:</label>
    <textarea id="new-tab-observation" placeholder="Ex: Mesa junto com a 2, aniversário, sem gelo..." style="width:100%; min-height:80px; margin-top:12px;"></textarea>

    <h4>Agrupar mesas</h4>
    <div id="group-tables-list"></div>

    <button onclick="confirmCreateTab(${tableId})">Abrir comanda</button>
  `;

      const list = document.getElementById("group-tables-list");

      list.innerHTML = tables.map(table => `
    <label style="display:block; margin-top:8px;">
      <input 
        type="checkbox" 
        class="group-table-checkbox" 
        value="${table.id}" 
        ${table.id === tableId ? "checked" : ""}
      />
      Mesa ${table.number}
    </label>
  `).join("");
    }

    async function confirmCreateTab(tableId) {
      const name = document.getElementById("new-tab-name").value.trim();
      const observation = document.getElementById("new-tab-observation").value.trim();

      if (!name) {
        alert("Informe o nome do cliente ou grupo.");
        return;
      }

      const selectedTables = Array.from(document.querySelectorAll(".group-table-checkbox:checked"))
        .map(input => Number(input.value));

      await fetch("http://127.0.0.1:8000/tabs/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          table_id: tableId,
          customer_name: name,
          customer_phone: null,
          observation: observation || null,
          grouped_table_ids: selectedTables
        })
      });

      await openTable(tableId);
      await loadTables();
    }

    async function resolveTableWaiterCall(tableId) {
      await fetch(`http://127.0.0.1:8000/tables/${tableId}/cancel-waiter`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

    loadTables();
    setInterval(loadTables, 5000);

    async function confirmClose(tabId, tableId) {
      await fetch(`http://127.0.0.1:8000/tabs/${tabId}/confirm-close`, {
        method: "PATCH"
      });

      await openTable(tableId);
      await loadTables();
    }

  </script>
</body>

</html>
