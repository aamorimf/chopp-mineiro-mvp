<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel - Chopp do Mineiro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    h1 {
      margin-bottom: 24px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 16px;
    }

    button,
    input,
    textarea {
      font: inherit;
      max-width: 100%;
    }

    button {
      min-height: 44px;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 6px 6px 6px 0;
      background: #ffd447;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    input,
    textarea {
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 12px;
      margin: 8px 0 12px;
      background: #f5f5f5;
      color: #111;
    }

    .table-card {
      border-radius: 12px;
      padding: 20px;
      color: #111;
      font-weight: bold;
      cursor: pointer;
      min-height: 100px;
      overflow-wrap: anywhere;
    }

    .white {
      background: #f5f5f5;
    }

    .green {
      background: #44d17a;
    }

    .yellow {
      background: #ffd447;
    }

    .red {
      background: #ff5c5c;
      color: #fff;
    }

    .reason {
      font-size: 13px;
      font-weight: normal;
      margin-top: 8px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .hidden {
      display: none;
    }

    .modal-content {
      background: #222;
      color: #fff;
      width: min(640px, 90vw);
      max-height: min(82vh, 760px);
      overflow-y: auto;
      border-radius: 16px;
      padding: 24px;
      position: relative;
    }

    .close-button {
      position: absolute;
      top: 12px;
      right: 16px;
      background: transparent;
      color: #fff;
      border: none;
      font-size: 28px;
      cursor: pointer;
    }

    .tab-block {
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      overflow: hidden;
    }

    .session-access-card {
      background: #1b1b1b;
      border-color: #ffd447;
    }

    .session-access-title {
      color: #ffd447;
      font-weight: bold;
      margin: 0 0 12px;
    }

    .session-url {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      color: #ddd;
      font-size: 13px;
      margin: 10px 0 14px;
      max-height: 92px;
      overflow-y: auto;
      padding: 10px;
      word-break: break-all;
    }

    .qr-wrap {
      align-items: center;
      display: flex;
      justify-content: center;
      margin: 14px 0;
    }

    .qr-code {
      background: #fff;
      border-radius: 8px;
      display: block;
      height: 280px;
      max-width: 100%;
      padding: 8px;
      width: 280px;
    }

    .session-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .session-actions button {
      margin: 0;
    }

    .session-warning {
      color: #ffd447;
      margin: 0;
    }

    .group-list {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .group-row {
      align-items: center;
      background: #1b1b1b;
      border: 1px solid #444;
      border-radius: 8px;
      display: flex;
      gap: 10px;
      justify-content: space-between;
      padding: 10px 12px;
    }

    .group-row label {
      align-items: center;
      cursor: pointer;
      display: flex;
      gap: 10px;
      margin: 0;
      width: 100%;
    }

    .group-row input {
      margin: 0;
      width: auto;
    }

    .order-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #333;
      align-items: center;
      flex-wrap: wrap;
    }

    .order-row:last-child {
      border-bottom: none;
    }

    .status-pending {
      color: #ffd447;
    }

    .status-delivered {
      color: #44d17a;
    }

    @keyframes blink {
      0% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }

      100% {
        opacity: 1;
      }
    }

    .blink {
      animation: blink 1s infinite;
    }

    .feedback-toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #44d17a;
      color: #111;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
      font-weight: bold;
      padding: 12px 18px;
      z-index: 2000;
    }
    .api-debug-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      max-width: min(360px, calc(100vw - 20px));
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      line-height: 1.3;
      z-index: 9999;
      word-break: break-all;
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 26px;
        margin-bottom: 16px;
      }

      .grid {
        grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
        gap: 12px;
      }

      .table-card {
        min-height: 92px;
        padding: 16px;
      }

      .modal {
        align-items: flex-start;
        padding: 10px;
      }

      .modal-content {
        border-radius: 12px;
        max-height: calc(100vh - 20px);
        padding: 20px 16px;
        width: 100%;
      }

      .close-button {
        min-height: 40px;
        min-width: 40px;
        padding: 0;
      }

      .tab-block {
        padding: 14px;
        margin-top: 14px;
      }

      .order-row {
        align-items: stretch;
        flex-direction: column;
        gap: 8px;
      }

      button {
        margin-right: 0;
        width: 100%;
      }

      .session-actions {
        flex-direction: column;
      }

      .api-debug-badge {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <h1>Painel do Salão</h1>

  <div id="api-debug-badge" class="api-debug-badge"></div>
  <div id="feedback-toast" class="feedback-toast hidden"></div>

  <div id="tables-grid" class="grid"></div>

  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <button class="close-button" onclick="closeModal()">×</button>
      <h2 id="modal-title"></h2>
      <div id="modal-body"></div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    document.getElementById("api-debug-badge").textContent = `API: ${window.API_BASE_URL}`;

    const tableSeenAt = {};
    let feedbackTimer = null;
    let currentModalTableId = null;
    let latestTableStatuses = [];
    let frontendOnlyTableGroups = [];

    function showFeedback(message) {
      const toast = document.getElementById("feedback-toast");
      toast.textContent = message;
      toast.classList.remove("hidden");

      if (feedbackTimer) {
        clearTimeout(feedbackTimer);
      }

      feedbackTimer = setTimeout(() => {
        toast.classList.add("hidden");
      }, 2000);
    }

    function getTableTimerText(table) {
      if (table.status === "white") {
        delete tableSeenAt[table.table_id];
        return "";
      }

      if (!tableSeenAt[table.table_id]) {
        tableSeenAt[table.table_id] = Date.now();
      }

      const minutes = Math.floor((Date.now() - tableSeenAt[table.table_id]) / 60000);
      return ` — ${minutes} min`;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function buildCustomerSessionUrl(tab, fallbackTableId) {
      if (!tab || !tab.session_token) {
        return null;
      }

      const sessionTableId = tab.session_table_id || fallbackTableId;

      if (!sessionTableId || !window.API_BASE_URL) {
        return null;
      }

      return new URL(
        `../customer/index.html?table_id=${sessionTableId}&session_token=${encodeURIComponent(tab.session_token)}&api_base_url=${encodeURIComponent(window.API_BASE_URL)}`,
        window.location.href
      ).href;
    }

    function buildQrCodeUrl(customerUrl) {
      return `https://api.qrserver.com/v1/create-qr-code/?size=280x280&data=${encodeURIComponent(customerUrl)}`;
    }

    function formatGroupedTables(currentTableNumber, groupedTableNumbers = []) {
      const group = groupedTableNumbers
        .map(Number)
        .filter(number => number && number !== Number(currentTableNumber));

      if (group.length === 0) {
        return `Mesa ${currentTableNumber}`;
      }

      return `Mesa ${currentTableNumber} • Grupo com ${group.join(", ")}`;
    }

    function getGroupedTableIdsFromData(data) {
      return (data.grouped_table_ids || []).map(Number).filter(Boolean);
    }

    function normalizeTableIds(ids) {
      return [...new Set(ids.map(Number).filter(Boolean))].sort((a, b) => a - b);
    }

    function getTableNumberFromStatuses(tableId, tables = latestTableStatuses) {
      const table = tables.find(item => Number(item.table_id) === Number(tableId));
      return table ? Number(table.table_number) : Number(tableId);
    }

    function findFrontendOnlyGroup(tableId) {
      return frontendOnlyTableGroups.find(group => group.includes(Number(tableId))) || [Number(tableId)];
    }

    function getMergedGroupIdsForTable(table, tables = latestTableStatuses) {
      const backendIds = normalizeTableIds(table.grouped_table_ids || [table.table_id]);
      const frontendIds = normalizeTableIds(findFrontendOnlyGroup(table.table_id));

      if (backendIds.length > 1 && frontendIds.length > 1) {
        return normalizeTableIds([...backendIds, ...frontendIds]);
      }

      if (backendIds.length > 1) {
        return backendIds;
      }

      if (frontendIds.length > 1) {
        return frontendIds;
      }

      return normalizeTableIds([table.table_id]);
    }

    function getGroupNumbersFromIds(groupIds, tables = latestTableStatuses) {
      return normalizeTableIds(groupIds)
        .map(tableId => getTableNumberFromStatuses(tableId, tables))
        .sort((a, b) => a - b);
    }

    function applyFrontendGroupsToTables(tables) {
      return tables.map(table => {
        const groupIds = getMergedGroupIdsForTable(table, tables);

        return {
          ...table,
          grouped_table_ids: groupIds,
          grouped_table_numbers: getGroupNumbersFromIds(groupIds, tables),
        };
      });
    }

    function applyFrontendGroupToDetails(data) {
      const statusTable = latestTableStatuses.find(table => Number(table.table_id) === Number(data.table_id));
      const groupIds = getMergedGroupIdsForTable(statusTable || data, latestTableStatuses);

      return {
        ...data,
        grouped_table_ids: groupIds,
        grouped_table_numbers: getGroupNumbersFromIds(groupIds, latestTableStatuses),
      };
    }

    function setFrontendOnlyGroup(tableIds) {
      const groupIds = normalizeTableIds(tableIds);

      if (groupIds.length <= 1) {
        return;
      }

      const mergedIds = normalizeTableIds([
        ...groupIds,
        ...frontendOnlyTableGroups
          .filter(group => group.some(tableId => groupIds.includes(tableId)))
          .flat(),
      ]);

      frontendOnlyTableGroups = [
        ...frontendOnlyTableGroups.filter(group => !group.some(tableId => mergedIds.includes(tableId))),
        mergedIds,
      ];
    }

    function removeFrontendOnlyGroupMembers(tableIds) {
      const ids = normalizeTableIds(tableIds);
      frontendOnlyTableGroups = frontendOnlyTableGroups
        .map(group => group.filter(tableId => !ids.includes(tableId)))
        .filter(group => group.length > 1);
    }

    function removeFrontendOnlyGroupedTable(tableId, groupedTableId) {
      const currentGroup = findFrontendOnlyGroup(tableId);
      const remainingGroup = currentGroup.filter(id => Number(id) !== Number(groupedTableId));

      removeFrontendOnlyGroupMembers(currentGroup);

      if (remainingGroup.length > 1) {
        setFrontendOnlyGroup(remainingGroup);
      }
    }

    function getBackendGroupIdsForTable(tableId, tables = latestTableStatuses) {
      const table = tables.find(item => Number(item.table_id) === Number(tableId));
      return normalizeTableIds(table ? table.grouped_table_ids || [table.table_id] : [tableId]);
    }

    function findGroupBackendAnchor(groupIds, tables = latestTableStatuses) {
      const groupSet = new Set(normalizeTableIds(groupIds));
      const table = tables.find(item =>
        groupSet.has(Number(item.table_id)) && Number(item.open_tabs_count || 0) > 0
      );

      return table ? Number(table.table_id) : null;
    }

    async function loadTables() {
      let tables = [];

      try {
        const response = await apiFetch("/tables/status/all");
        tables = await response.json();
        latestTableStatuses = tables;
      } catch (error) {
        document.getElementById("tables-grid").innerHTML = `<p>Erro ao carregar mesas: ${error.message}</p>`;
        return;
      }

      const renderedTables = applyFrontendGroupsToTables(tables);
      const grid = document.getElementById("tables-grid");
      grid.innerHTML = "";

      renderedTables.forEach(table => {
        const card = document.createElement("div");
        card.className = `table-card ${table.status}`;
        const timerText = getTableTimerText(table);

        if (table.status === "red" && table.attention_type === "close_request") {
          card.classList.add("blink");
        }

        card.innerHTML = `
          <div>${formatGroupedTables(table.table_number, table.grouped_table_numbers)}${timerText}</div>
          <div class="reason">${table.reason}</div>
          <div class="reason">Comandas abertas: ${table.open_tabs_count}</div>
        `;

        card.onclick = () => openTable(table.table_id);

        grid.appendChild(card);
      });
    }

    async function openTable(tableId) {
      let data;

      try {
        const response = await apiFetch(`/tables/${tableId}/staff-details`);
        data = await response.json();
      } catch (error) {
        alert(`Erro ao carregar mesa: ${error.message}`);
        return;
      }

      data = applyFrontendGroupToDetails(data);
      currentModalTableId = tableId;
      document.getElementById("modal-title").textContent = formatGroupedTables(data.table_number, data.grouped_table_numbers);

      const body = document.getElementById("modal-body");
      body.innerHTML = "";
      body.innerHTML = `
          <button onclick="openCreateTabForm(${tableId})">Abrir nova comanda</button>
          <button onclick="openGroupTables(${tableId})">Agrupar mesas</button>
          ${data.is_calling_waiter
          ? `<button onclick="resolveTableWaiterCall(${tableId})">Atendimento realizado</button>`
          : ""
        }
        `;

      const sessionLinks = [];
      const seenSessions = new Set();

      data.tabs.forEach(tab => {
        if (!tab.session_token) {
          sessionLinks.push(`
          <div class="tab-block session-access-card">
            <p class="session-warning">Link do cliente indispon&iacute;vel para a comanda #${tab.tab_id}.</p>
          </div>
        `);
          return;
        }

        if (seenSessions.has(tab.session_token)) return;

        seenSessions.add(tab.session_token);

        const url = buildCustomerSessionUrl(tab, tableId);

        if (!url) {
          sessionLinks.push(`
          <div class="tab-block session-access-card">
            <p class="session-warning">N&atilde;o foi poss&iacute;vel gerar o link do cliente para a comanda #${tab.tab_id}.</p>
          </div>
        `);
          return;
        }

        const encodedUrl = encodeURIComponent(url);
        const qrUrl = buildQrCodeUrl(url);

        sessionLinks.push(`
          <div class="tab-block session-access-card">
            <p class="session-access-title">Aponte a c&acirc;mera para acompanhar a comanda em tempo real</p>
            <div class="qr-wrap">
              <img class="qr-code" src="${escapeHtml(qrUrl)}" alt="QR Code da comanda" width="280" height="280" loading="lazy">
            </div>
            <p><strong>Link da sessão:</strong></p>
            <div class="session-url">${escapeHtml(url)}</div>
            <div class="session-actions">
              <button onclick="copySessionLinkFromEncoded('${encodedUrl}')">Copiar link</button>
              <button onclick="openCustomerViewFromEncoded('${encodedUrl}')">Abrir visualiza&ccedil;&atilde;o do cliente</button>
            </div>
          </div>
        `);
      });

      if (sessionLinks.length > 0) {
        body.innerHTML += sessionLinks.join("");
      }

      if (data.tabs.length === 0) {
        body.innerHTML += "<p>Nenhuma comanda aberta nesta mesa.</p>";
      }

      data.tabs.forEach(tab => {
        const tabBlock = document.createElement("div");
        tabBlock.className = "tab-block";

        let ordersHtml = "";
        let total = 0;
        const isClosingFlow = tab.is_requesting_close || tab.is_closing_confirmed;

        if (tab.orders.length === 0) {
          ordersHtml = "<p>Nenhum pedido nesta comanda.</p>";
        } else {
          ordersHtml = tab.orders.map(order => {

            const price = order.price || 0;
            total += price * order.quantity;

            return `
              <div class="order-row">
                <span>${order.product_name} x${order.quantity}</span>
                ${isClosingFlow
                ? `<span>R$ ${(price * order.quantity).toFixed(2)}</span>`
                : ""
              }
                ${order.is_delivered
                ? `<span class="status-delivered">Entregue</span>`
                : `
                    <button onclick="deliverOrder(${order.id}, ${tableId})">Marcar entregue</button>
                    <button onclick="cancelOrder(${order.id}, ${tableId})">Cancelar pedido</button>
                  `
              }
              </div>
            `;
          }).join("");
        }

        if (isClosingFlow) {
          ordersHtml += `<hr><strong>Total: R$ ${total.toFixed(2)}</strong>`;
        }

        const closeActionsHtml = `
          ${!tab.is_requesting_close && !tab.is_closing_confirmed
            ? `<button onclick="requestCloseFromStaff(${tab.tab_id}, ${tableId})">Pedir conta</button>`
            : ""
          }
          ${tab.is_requesting_close && !tab.is_closing_confirmed
            ? `<button onclick="confirmClose(${tab.tab_id}, ${tableId})">Confirmar conta</button>`
            : ""
          }
          ${tab.is_requesting_close || tab.is_closing_confirmed
            ? `<button onclick="cancelClose(${tab.tab_id}, ${tableId})">Cancelar fechamento</button>`
            : ""
          }
          ${tab.is_closing_confirmed
            ? `<button onclick="closeTab(${tab.tab_id}, ${tableId})">Finalizar comanda</button>`
            : ""
          }
        `;

        tabBlock.innerHTML = `
          <h3>Comanda #${tab.tab_id}</h3>
          <p><strong>Cliente:</strong> ${tab.customer_name}</p>
          <p><strong>Observação:</strong> ${tab.observation || "Sem observação"}</p>
          <p><strong>Mesas agrupadas:</strong> ${formatGroupedTables(data.table_number, data.grouped_table_numbers)}</p>
          <p><strong>Fechamento:</strong> ${tab.is_closing_confirmed
            ? "Confirmado"
            : tab.is_requesting_close
              ? "Solicitado"
              : "Não solicitado"
          }</p>
          ${closeActionsHtml}
          <p><strong>Atendimento:</strong> ${tab.is_calling_waiter ? "Garçom solicitado" : "Sem chamado"}</p>
          <button onclick="openNewOrder(${tab.tab_id})">Novo pedido</button>
          ${tab.is_calling_waiter
            ? `<button onclick="resolveWaiterCall(${tab.tab_id}, ${tableId})">Atendimento realizado</button>`
            : ""
          }
          ${ordersHtml}
        `;

        body.appendChild(tabBlock);
      });

      document.getElementById("modal").classList.remove("hidden");
    }

    let staffCart = []
    let selectedTabId = null

    async function openNewOrder(tabId) {
      selectedTabId = tabId
      staffCart = []

      let products = []

      try {
        const response = await apiFetch("/products/")
        products = await response.json()
      } catch (error) {
        alert(`Erro ao carregar produtos: ${error.message}`)
        return
      }

      const body = document.getElementById("modal-body")

      body.innerHTML = `
        <h3>Novo Pedido</h3>
        <div id="product-list"></div>
        <div id="cart"></div>
        <button onclick="confirmStaffOrder()">Confirmar Pedido</button>
  `

      const list = document.getElementById("product-list")

      products.forEach(p => {
        const btn = document.createElement("button")
        btn.textContent = p.name
        btn.onclick = () => addToStaffCart(p)
        list.appendChild(btn)
      })
    }

    function addToStaffCart(product) {
      const item = staffCart.find(i => i.product_id === product.id)

      if (item) {
        item.quantity++
      } else {
        staffCart.push({
          product_id: product.id,
          name: product.name,
          quantity: 1
        })
      }

      renderStaffCart()
    }

    function removeStaffItem(id) {
      staffCart = staffCart.filter(i => i.product_id !== id)
      renderStaffCart()
    }

    function renderStaffCart() {
      const cartDiv = document.getElementById("cart")

      if (staffCart.length === 0) {
        cartDiv.innerHTML = "<p>Nenhum item</p>"
        return
      }

      cartDiv.innerHTML = staffCart.map(item => `
    <p>
      ${item.name} x${item.quantity}
      <button onclick="removeStaffItem(${item.product_id})">Remover</button>
    </p>
  `).join("")
    }

    async function confirmStaffOrder() {
      if (staffCart.length === 0) {
        alert("Adicione itens")
        return
      }

      try {
        await apiFetch("/orders/batch", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            tab_id: selectedTabId,
            items: staffCart.map(i => ({
              product_id: i.product_id,
              quantity: i.quantity
            }))
          })
        })
      } catch (error) {
        alert(`Erro ao enviar pedido: ${error.message}`)
        return
      }

      showFeedback("✔ Pedido enviado")

      await openTable(Number(currentModalTableId))
      await loadTables()
    }

    async function deliverOrder(orderId, tableId) {
      try {
        await apiFetch(`/orders/${orderId}/deliver`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao marcar pedido entregue: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("✔ Pedido entregue");
    }

    async function cancelOrder(orderId, tableId) {
      const confirmed = confirm("Deseja cancelar este pedido?");

      if (!confirmed) return;

      try {
        await apiFetch(`/orders/${orderId}/cancel`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao cancelar pedido: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    async function copySessionLink(url) {
      await navigator.clipboard.writeText(url);
      alert("Link da sessão copiado.");
    }

    async function copySessionLinkFromEncoded(encodedUrl) {
      await copySessionLink(decodeURIComponent(encodedUrl));
    }

    function openCustomerViewFromEncoded(encodedUrl) {
      window.open(decodeURIComponent(encodedUrl), "_blank", "noopener");
    }

    async function requestCloseFromStaff(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/request-close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao pedir a conta: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Conta pedida");
    }

    async function cancelClose(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/cancel-close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao cancelar a conta: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Conta cancelada");
    }

    async function closeTab(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao encerrar comanda: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Comanda finalizada com sucesso");
    }

    async function resolveWaiterCall(tabId, tableId) {
      try {
        // limpa chamada da comanda
        await apiFetch(`/tabs/${tabId}/cancel-waiter`, {
          method: "PATCH"
        });

        // limpa chamada da mesa
        await apiFetch(`/tables/${tableId}/cancel-waiter`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao resolver chamado: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    async function openGroupTables(tableId) {
      let tables = [];
      let group = { grouped_table_ids: [], grouped_table_numbers: [] };

      try {
        const [tablesResponse, groupResponse] = await Promise.all([
          apiFetch("/tables/status/all"),
          apiFetch(`/tables/${tableId}/group`)
        ]);
        tables = await tablesResponse.json();
        group = await groupResponse.json();
        latestTableStatuses = tables;
      } catch (error) {
        alert(`Erro ao carregar agrupamento: ${error.message}`);
        return;
      }

      const renderedTables = applyFrontendGroupsToTables(tables);
      const currentTable = renderedTables.find(table => Number(table.table_id) === Number(tableId));
      const groupedIds = currentTable
        ? normalizeTableIds(currentTable.grouped_table_ids)
        : normalizeTableIds(group.grouped_table_ids || [tableId]);
      const groupedNumbers = getGroupNumbersFromIds(groupedIds, renderedTables);
      const removableTables = renderedTables.filter(table =>
        Number(table.table_id) !== Number(tableId) && groupedIds.includes(Number(table.table_id))
      );
      const selectableTables = renderedTables.filter(table => Number(table.table_id) !== Number(tableId));
      const body = document.getElementById("modal-body");

      body.innerHTML = `
        <h3>Agrupar mesas</h3>
        <p><strong>${formatGroupedTables(currentTable ? currentTable.table_number : tableId, groupedNumbers)}</strong></p>
        <div id="current-group-list"></div>
        <div id="tables-group-list" class="group-list"></div>
        <button onclick="confirmGroupTables(${tableId})">Confirmar agrupamento</button>
        <button onclick="openTable(${tableId})">Voltar</button>
      `;

      const currentGroupList = document.getElementById("current-group-list");

      if (removableTables.length > 0) {
        currentGroupList.innerHTML = `
          <p><strong>Mesas no grupo:</strong></p>
          <div class="group-list">
            ${removableTables.map(table => `
              <div class="group-row">
                <span>Mesa ${table.table_number}</span>
                <button onclick="removeGroupedTable(${tableId}, ${table.table_id})">Remover</button>
              </div>
            `).join("")}
          </div>
        `;
      } else {
        currentGroupList.innerHTML = "<p>Nenhuma mesa agrupada ainda.</p>";
      }

      const list = document.getElementById("tables-group-list");
      list.innerHTML = selectableTables.map(table => `
        <div class="group-row">
          <label>
            <input
              type="checkbox"
              class="group-table-checkbox"
              value="${table.table_id}"
              ${groupedIds.includes(Number(table.table_id)) ? "checked" : ""}
            />
            <span>Mesa ${table.table_number} - ${table.reason} (${table.open_tabs_count} comandas)</span>
          </label>
        </div>
      `).join("");
    }

    async function confirmGroupTables(tableId) {
      const selectedTables = Array.from(document.querySelectorAll(".group-table-checkbox:checked"))
        .map(input => Number(input.value));

      if (selectedTables.length === 0) {
        alert("Selecione ao menos uma mesa para agrupar.");
        return;
      }

      const groupIds = normalizeTableIds([tableId, ...selectedTables]);
      const backendAnchorTableId = findGroupBackendAnchor(groupIds);

      if (backendAnchorTableId) {
        try {
          await apiFetch(`/tables/${backendAnchorTableId}/group`, {
            method: "PATCH",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              table_ids: groupIds.filter(id => id !== backendAnchorTableId)
            })
          });
          removeFrontendOnlyGroupMembers(groupIds);
        } catch (error) {
          alert(`Erro ao agrupar mesas: ${error.message}`);
          return;
        }
      } else {
        setFrontendOnlyGroup(groupIds);
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Mesas agrupadas com sucesso");
    }

    async function removeGroupedTable(tableId, groupedTableId) {
      const backendGroupIds = getBackendGroupIdsForTable(tableId);

      if (backendGroupIds.includes(Number(groupedTableId)) && backendGroupIds.length > 1) {
        try {
          await apiFetch(`/tables/${tableId}/group/${groupedTableId}`, {
            method: "DELETE"
          });
        } catch (error) {
          alert(`Erro ao remover mesa do grupo: ${error.message}`);
          return;
        }
      } else {
        removeFrontendOnlyGroupedTable(tableId, groupedTableId);
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Mesa removida do grupo");
    }

    async function openCreateTabForm(tableId) {
      const body = document.getElementById("modal-body");

      body.innerHTML = `
    <h3>Abrir comanda</h3>

    <label>Nome do cliente ou grupo:</label>
    <input id="new-tab-name" placeholder="Ex: Jo&atilde;o / Mesa da fam&iacute;lia" />

    <label>Observa&ccedil;&atilde;o:</label>
    <textarea id="new-tab-observation" placeholder="Ex: anivers&aacute;rio, sem gelo..." style="width:100%; min-height:80px; margin-top:12px;"></textarea>

    <button onclick="confirmCreateTab(${tableId})">Abrir comanda</button>
    <button onclick="openTable(${tableId})">Voltar</button>
  `;
    }

    async function confirmCreateTab(tableId) {
      const name = document.getElementById("new-tab-name").value.trim();
      const observation = document.getElementById("new-tab-observation").value.trim();

      if (!name) {
        alert("Informe o nome do cliente ou grupo.");
        return;
      }

      try {
        const currentTable = applyFrontendGroupsToTables(latestTableStatuses)
          .find(table => Number(table.table_id) === Number(tableId));
        const groupedTableIds = currentTable
          ? normalizeTableIds(currentTable.grouped_table_ids)
          : normalizeTableIds([tableId]);
        const payload = {
          table_id: tableId,
          customer_name: name,
          customer_phone: null,
          observation: observation || null
        };

        if (groupedTableIds.length > 1) {
          payload.grouped_table_ids = groupedTableIds;
        }

        await apiFetch("/tabs/", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });
        removeFrontendOnlyGroupMembers(groupedTableIds);
      } catch (error) {
        alert(`Erro ao abrir comanda: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    async function resolveTableWaiterCall(tableId) {
      try {
        await apiFetch(`/tables/${tableId}/cancel-waiter`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao resolver chamado: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
    }

    loadTables();
    setInterval(loadTables, 5000);

    async function confirmClose(tabId, tableId) {
      try {
        await apiFetch(`/tabs/${tabId}/confirm-close`, {
          method: "PATCH"
        });
      } catch (error) {
        alert(`Erro ao confirmar fechamento: ${error.message}`);
        return;
      }

      await openTable(tableId);
      await loadTables();
      showFeedback("Conta confirmada");
    }

  </script>
</body>
