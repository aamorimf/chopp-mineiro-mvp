<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel do Dono - Chopp do Mineiro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
      margin: 0;
      padding: 24px;
      line-height: 1.45;
      overflow-x: hidden;
    }

    h1 {
      margin-bottom: 6px;
    }

    .subtitle {
      color: #bbb;
      margin-top: 0;
      margin-bottom: 20px;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    button {
      background: #44d17a;
      color: #111;
      border: none;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: bold;
      cursor: pointer;
    }

    section {
      margin-bottom: 28px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }

    .revenue-hero {
      background: #163322;
      border: 1px solid #44d17a;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 12px;
    }

    .revenue-label {
      color: #aee8c2;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .revenue-value {
      color: #44d17a;
      font-size: 48px;
      font-weight: bold;
      line-height: 1;
    }

    .summary-card,
    .panel {
      background: #222;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 16px;
    }

    .settings-grid {
      display: grid;
      gap: 16px;
      margin-bottom: 18px;
    }

    .settings-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-item input[type="number"] {
      padding: 12px;
      border-radius: 8px;
      border: none;
      font-size: 16px;
    }

    .settings-item label {
      font-weight: bold;
    }

    .summary-label {
      color: #bbb;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .summary-value {
      color: #ffd447;
      font-size: 20px;
      font-weight: bold;
    }

    .list-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid #333;
      overflow-wrap: anywhere;
    }

    .list-row:last-child {
      border-bottom: none;
    }

    .muted {
      color: #bbb;
    }

    .strong {
      font-weight: bold;
      color: #ffd447;
    }

    .top-product {
      background: #2f2a16;
      border: 1px solid #ffd447;
      border-radius: 12px;
      color: #ffd447;
      font-weight: bold;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .api-debug-badge {
      position: fixed;
      right: 10px;
      bottom: 10px;
      max-width: min(360px, calc(100vw - 20px));
      background: rgba(0, 0, 0, 0.78);
      color: #fff;
      border: 1px solid #555;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 11px;
      line-height: 1.3;
      z-index: 9999;
      word-break: break-all;
      opacity: 0.85;
    }

    @media (max-width: 600px) {
      body {
        padding: 16px;
      }

      .top-actions {
        align-items: flex-start;
      }

      .revenue-value {
        font-size: 36px;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .list-row {
        grid-template-columns: 1fr;
        gap: 4px;
      }

      button {
        min-height: 44px;
      }

      .api-debug-badge {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div id="api-debug-badge" class="api-debug-badge"></div>
  <div class="top-actions">
    <div>
      <h1>Painel do Dono</h1>
      <p class="subtitle">Resumo em tempo real do seu bar</p>
    </div>
  </div>

  <section>
  <h2>⚙️ Configurações Financeiras</h2>

  <div class="panel">
    <div class="settings-grid">

      <div class="settings-item">
        <label>
          <input type="checkbox" id="service-fee-enabled">
          Cobrar 10% do garçom
        </label>
      </div>

      <div class="settings-item">
        <label>Percentual do serviço (%)</label>
        <input type="number" id="service-fee-percentage" min="0" max="100" step="0.5">
      </div>

      <div class="settings-item">
        <label>
          <input type="checkbox" id="couvert-enabled">
          Cobrar couvert artístico
        </label>
      </div>

      <div class="settings-item">
        <label>Valor do couvert</label>
        <input type="number" id="couvert-price" min="0" step="0.5">
      </div>

    </div>

    <button onclick="saveSettings()">Salvar configurações</button>
  </div>
</section>

  <section>
    <h2>📊 Resumo do Dia</h2>
    <div id="revenue-hero" class="revenue-hero"></div>
    <div id="summary-grid" class="summary-grid"></div>
  </section>

  <section>
    <h2>🧾 Comandas encerradas</h2>
    <div id="closed-tabs" class="panel"></div>
  </section>

  <section>
    <h2>🔥 Itens mais vendidos</h2>
    <div id="top-product"></div>
    <div id="items-sold" class="panel"></div>
  </section>

  <script src="../config.js"></script>
  <script src="../api.js"></script>
  <script>
    document.getElementById("api-debug-badge").textContent = `API: ${window.API_BASE_URL}`;

    function formatCurrency(value) {
      return `R$ ${Number(value || 0).toFixed(2)}`;
    }

    function translatePaymentMethod(method) {
      switch (method) {
        case "cash":
          return "💵 Dinheiro";

        case "pix":
          return "📱 Pix";

        case "debit":
          return "💳 Débito";

        case "credit":
          return "🏦 Crédito";

        default:
          return "Não informado";
      }
    }

    function renderSummary(data) {
      const revenueHero = document.getElementById("revenue-hero");
      const grid = document.getElementById("summary-grid");

      revenueHero.innerHTML = `
        <div class="revenue-label">Total vendido hoje</div>
        <div class="revenue-value">${formatCurrency(data.total_revenue)}</div>
      `;

      grid.innerHTML = `
        <div class="summary-card">
          <div class="summary-label">Comandas encerradas</div>
          <div class="summary-value">${data.closed_tabs_count}</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Ticket médio</div>
          <div class="summary-value">${formatCurrency(data.average_ticket)}</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Comandas abertas</div>
          <div class="summary-value">${data.open_tabs_count}</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">Em fechamento</div>
          <div class="summary-value">${data.closing_tabs_count}</div>
        </div>

        <div class="summary-card">
          <div class="summary-label">💵 Dinheiro</div>
          <div class="summary-value">
            ${formatCurrency(data.payment_methods.cash.total)}
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-label">📱 Pix</div>
          <div class="summary-value">
            ${formatCurrency(data.payment_methods.pix.total)}
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-label">💳 Débito</div>
          <div class="summary-value">
            ${formatCurrency(data.payment_methods.debit.total)}
          </div>
        </div>

        <div class="summary-card">
          <div class="summary-label">🏦 Crédito</div>
          <div class="summary-value">
            ${formatCurrency(data.payment_methods.credit.total)}
          </div>
        </div>
      `;
    }

    function renderClosedTabs(closedTabs) {
      const container = document.getElementById("closed-tabs");

      if (!closedTabs || closedTabs.length === 0) {
        container.innerHTML = '<p class="muted">Nenhuma comanda encerrada hoje.</p>';
        return;
      }

      container.innerHTML = closedTabs.map(tab => `
        <div class="list-row">
          <span>
            Mesa ${tab.table_number} | ${tab.customer_name}
            <br>
            <span class="muted">
              ${translatePaymentMethod(tab.payment_method)}
            </span>
          </span>

          <span class="strong">
            ${formatCurrency(tab.total_amount)}
          </span>
        </div>
      `).join("");
    }

    function renderItemsSold(itemsSold) {
      const topProduct = document.getElementById("top-product");
      const container = document.getElementById("items-sold");

      if (!itemsSold || itemsSold.length === 0) {
        topProduct.innerHTML = "";
        container.innerHTML = '<p class="muted">Nenhum item vendido hoje.</p>';
        return;
      }

      const firstItem = itemsSold[0];
      topProduct.innerHTML = `
        <div class="top-product">
          🏆 Mais vendido hoje: ${firstItem.product_name} — ${firstItem.quantity_sold} vendas
        </div>
      `;

      container.innerHTML = itemsSold.map(item => `
        <div class="list-row">
          <span>${item.product_name} <span class="muted">x${item.quantity_sold}</span></span>
          <span class="strong">${formatCurrency(item.total_amount)}</span>
        </div>
      `).join("");
    }

    async function loadDailySummary() {
      let data;

      try {
        const response = await apiFetch("/tabs/daily-summary");
        data = await response.json();
      } catch (error) {
        document.getElementById("revenue-hero").innerHTML = `<p>Erro ao carregar painel: ${error.message}</p>`;
        document.getElementById("summary-grid").innerHTML = "";
        document.getElementById("closed-tabs").innerHTML = "";
        document.getElementById("items-sold").innerHTML = "";
        return;
      }

      renderSummary(data);
      renderClosedTabs(data.closed_tabs);
      renderItemsSold(data.items_sold);
    }

    async function loadSettings() {
      try {
        const response = await apiFetch("/settings/");
        const settings = await response.json();

        document.getElementById("service-fee-enabled").checked =
          settings.service_fee_enabled;

        document.getElementById("service-fee-percentage").value =
          settings.service_fee_percentage;

        document.getElementById("couvert-enabled").checked =
          settings.couvert_enabled;

        document.getElementById("couvert-price").value =
          settings.couvert_price;

      } catch (error) {
        console.error("Erro ao carregar configurações:", error);
      }
    }

    async function saveSettings() {
      const payload = {
        service_fee_enabled:
          document.getElementById("service-fee-enabled").checked,

        service_fee_percentage:
          Number(document.getElementById("service-fee-percentage").value),

        couvert_enabled:
          document.getElementById("couvert-enabled").checked,

        couvert_price:
          Number(document.getElementById("couvert-price").value),
      };

      try {
        await apiFetch("/settings/", {
          method: "PATCH",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        alert("Configurações salvas com sucesso");

      } catch (error) {
        alert(`Erro ao salvar configurações: ${error.message}`);
      }
    }
    
    loadSettings();
    loadDailySummary();
    setInterval(loadDailySummary, 5000);
  </script>
</body>

</html>
